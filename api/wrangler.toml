name = "audoria-api"
main = "src/cloudflare.ts"
compatibility_date = "2025-05-01"
compatibility_flags = [ "nodejs_compat" ]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "audoria-db"
database_id = "" # Set after: wrangler d1 create audoria-db

# ── R2 Storage (optional, for covers) ──
[[r2_buckets]]
binding = "R2"
bucket_name = "audoria-covers"

# ── Environment variables ──
[vars]
# Set secrets via: wrangler secret put SECRET_KEY
DB_TYPE = "d1"
